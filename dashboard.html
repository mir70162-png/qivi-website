<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QIVI Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#05050a;color:#e5e5e5;display:flex;height:100vh}
.sidebar{width:260px;background:#0a0a12;padding:25px;border-right:1px solid #222}
.logo{font-size:2rem;font-weight:800;color:#8b5cf6;margin-bottom:40px}
.nav-item{color:#aaa;text-decoration:none;display:block;padding:14px 16px;border-radius:10px;margin-bottom:8px}
.nav-item:hover{background:#1a1a25;color:#fff}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:20px 30px;border-bottom:1px solid #222}
.chat-container{flex:1;padding:30px;overflow-y:auto}
.message{padding:18px 20px;margin:15px 0;border-radius:14px;max-width:80%}
.message.qivi{background:#111118;border-left:3px solid #6366f1}
.message.user{background:#6366f1;margin-left:auto}
.input-area{padding:20px 30px;border-top:1px solid #222}
.input-box{display:flex;gap:12px}
.input-box input{flex:1;padding:16px;background:#111118;color:#fff;border:1px solid #333;border-radius:12px}
.input-box button{padding:16px 30px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-weight:700}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">QIVI</div>
<a href="#" class="nav-item">💬 Chat</a>
<a href="#" class="nav-item">🧠 Memory</a>
<a href="#" class="nav-item">📧 Gmail</a>
</div>
<div class="main">
<div class="header"><h1>QIVI Assistant</h1></div>
<div class="chat-container" id="chatBox">
<div class="message qivi">Hello! I am QIVI. What should I do?</div>
</div>
<div class="input-area">
<div class="input-box">
<input type="text" id="userInput" placeholder="Ask QIVI anything...">
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>
<script>
function sendMessage() {
const input = document.getElementById('userInput');
const chatBox = document.getElementById('chatBox');
const message = input.value;
if(message === '') return;
chatBox.innerHTML += `<div class="message user">${message}</div>`;
input.value = '';
setTimeout(() => {
chatBox.innerHTML += `<div class="message qivi">Got it! I will work on that.</div>`;
chatBox.scrollTop = chatBox.scrollHeight;
}, 1000);
}
document.getElementById('userInput').addEventListener("keypress", function(e) {
if(e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
